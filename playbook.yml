- name: Deploy to Tomcat 
hosts: web 
become: yes 
tasks: - name: Copy WAR file to Tomcat 
copy: 
src: "/var/snap/jenkins/5022/workspace/anscprac/target/ansibleapp.war" 
dest: "/opt/tomcat/webapps/ansibleapp.war" 
remote_src: no - name: Restart Tomcat 
shell: | 
/opt/tomcat/bin/shutdown.sh || true 
sleep 5 
/opt/tomcat/bin/startup.sh
